database:
  type: sqlite

pay-in-creative: true
pay-while-riding: false

trackable_entities:

# Specialization System Configuration
# Players choose a pet specialization when reaching the upgrade-level for their job
# Once chosen, the specialization is permanent unless the player has bypass permission
specialization:
  # Permission to allow changing specialization after initial choice
  # Grant 'modularjobs.specialization.bypass' to allow changing for all jobs
  # Or grant 'modularjobs.specialization.bypass.<job_name>' for specific jobs (e.g., modularjobs.specialization.bypass.miner)
  bypass-permission: "modularjobs.specialization.bypass"

# Color scheme for all command outputs
# Supports hex colors (e.g., #FFD700)
colors:
  primary: "#FFD700"      # Main highlights (titles, keys)
  secondary: "#FFFF00"    # Secondary highlights (values)
  accent: "#00FFFF"       # Accent colors (types)
  tertiary: "#FF00FF"     # Tertiary colors (special info)
  neutral: "#808080"      # Neutral/gray text (labels, borders)
  error: "#FF0000"        # Error messages

# Player preferences for info displays
preferences:
  # Default number of entries to show per page in chat output
  # Players can override this with /jobs info preference entries <number>
  entries-per-page: 10
  # Default view mode: true = GUI dialog, false = chat output
  # Players can override with /jobs info preference gui/chat
  default-gui-mode: true
