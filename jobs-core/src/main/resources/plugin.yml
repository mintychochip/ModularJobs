name: ModularJobs
version: '1.1'
main: net.aincraft.ModularJobsBootstrap
authors: [ mintychochip ]
api-version: '1.13'
depend:
  - Mint
softdepend:
  - Choco
commands:
  test:
    description: asdads
permissions:
  modularjobs.admin:
    description: Admin commands for ModularJobs
    default: op
  modularjobs.specialization.bypass:
    description: Allows changing pet specialization after initial choice
    default: op
  modularjobs.specialization.bypass.*:
    description: Allows changing pet specialization for all jobs
    default: op
    children:
      modularjobs.specialization.bypass: true
